jdk:
  - openjdk21
before_install:
  - chmod +x ./gradlew
install:
  - |
    if [[ "$VERSION" == *"~"* ]]; then
      MC_VER=$(echo "$VERSION" | cut -d'~' -f1)
    else
      MC_VER=$VERSION
    fi
    echo "Configuring JitPack to isolate build to module: :$MC_VER"
    ./gradlew :$MC_VER:publishToMavenLocal -Pversion=$VERSION
